<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍城麵線 - 點餐網關</title>
  <style>
    :root {
      --primary: #ff6b35;
      --bg: #0f172a;
      --text: #f8fafc;
    }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 20px;
    }
    .logo {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: pulse 2s infinite ease-in-out;
    }
    h2 {
      font-size: 1.25rem;
      margin: 10px 0;
      font-weight: 600;
    }
    p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 30px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 107, 53, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s linear infinite;
      margin: 0 auto 30px auto;
    }
    .fallback-links {
      font-size: 0.8rem;
      border-top: 1px solid #334155;
      padding-top: 20px;
    }
    .fallback-links a {
      color: var(--primary);
      text-decoration: none;
      margin: 0 10px;
    }
    .fallback-links a:hover {
      text-decoration: underline;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🥢</div>
    <h2>龍城麵線</h2>
    <p>正在為您連接最快速的點餐伺服器，請稍候...</p>
    <div class="spinner"></div>
    
    <div class="fallback-links">
      <div style="margin-bottom: 8px;">若長時間未自動跳轉，請點選下方連結：</div>
      <a href="https://dragon.twabc.com" id="primary-link">主要站點 (推薦)</a> | 
      <a href="https://dragon1.twabc.com" id="backup-link">備用站點</a>
    </div>
  </div>

  <script>
    const primaryUrl = 'https://dragon.twabc.com';
    const backupUrl = 'https://dragon1.twabc.com';
    const search = window.location.search;

    // Update manual links with query parameters
    document.getElementById('primary-link').href = primaryUrl + search;
    document.getElementById('backup-link').href = backupUrl + search;

    // Failover detection logic
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 1800); // 1.8s timeout

    // We fetch a small file (favicon.svg) from the primary server to test connectivity
    fetch(primaryUrl + '/favicon.svg', { mode: 'no-cors', signal: controller.signal })
      .then(() => {
        clearTimeout(timeoutId);
        window.location.replace(primaryUrl + search);
      })
      .catch((err) => {
        clearTimeout(timeoutId);
        console.warn("Primary server offline, redirecting to backup...", err);
        window.location.replace(backupUrl + search);
      });
  </script>
</body>
</html>
