<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>龍城麵線 點餐網關</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #fcf8f6;
      color: #4a3e3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 107, 53, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border-left-color: #ff6b35;
      animation: spin 1s linear infinite;
      margin-bottom: 24px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h2 {
      margin: 0 0 8px 0;
      color: #ff6b35;
    }
    p {
      font-size: 0.9rem;
      color: #887d7b;
      margin: 0;
    }
  </style>
  <script>
    // 網域名稱配置
    const MAIN_SITE = "https://dragon1.twabc.com" + window.location.search;   // 主站 (Vercel - 正常更新中)
    const BACKUP_SITE = "https://dragon.twabc.com" + window.location.search; // 備援站 (Netlify - 額度用盡)
    const TIMEOUT_MS = 3000; // 等待主站回應的超時時間 (3秒)

    let isRedirected = false;

    // 跳轉至備援站
    function redirectToBackup() {
      if (!isRedirected) {
        isRedirected = true;
        console.log("主站回應超時，自動轉往備援站...");
        window.location.replace(BACKUP_SITE);
      }
    }

    // 跳轉至主站
    function redirectToMain() {
      if (!isRedirected) {
        isRedirected = true;
        window.location.replace(MAIN_SITE);
      }
    }

    // 設定定時器：如果 3 秒內主站沒回應，自動判定主站離線並跳轉至備援站
    const timeoutTimer = setTimeout(() => {
      redirectToBackup();
    }, TIMEOUT_MS);

    // 在背景發送一個輕量請求測試主站連線
    fetch(MAIN_SITE, { mode: 'no-cors', cache: 'no-store' })
      .then(() => {
        clearTimeout(timeoutTimer);
        redirectToMain();
      })
      .catch((err) => {
        clearTimeout(timeoutTimer);
        redirectToBackup();
      });
  </script>
</head>
<body>
  <div class="spinner"></div>
  <h2>正在連線至龍城麵線點餐系統...</h2>
  <p>系統正在為您偵測並分配最快的分流節點，請稍候。</p>
</body>
</html>
